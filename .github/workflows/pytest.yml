name: Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  LUA_LS_VERSION: "3.15.0"
  VERIBLE_VERSION: "v0.0-4051-g9fdb4057"
  REGAL_VERSION: "0.39.0"
  FPC_VERSION: "3.2.2"
  SWIFT_VERSION: "6.1.2"
  ZIG_VERSION: "0.14.1"
  ZLS_VERSION: "0.14.0"
  ELM_VERSION: "0.19.1-6"
  HAXE_VERSION: "4.3.7"
  RUBY_VERSION: "3.4"
  R_VERSION: "4.4.2"
  JULIA_VERSION: "1.10"

jobs:
  lint-type:
    name: Lint and type-check on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        env:
          UV_CACHE_DIR: ${{ runner.temp }}/uv-cache
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Restore Python environment cache
        uses: actions/cache@v4
        with:
          path: |
            .venv
            ${{ runner.temp }}/uv-cache
          key: python-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock') }}-v3
          restore-keys: |
            python-${{ runner.os }}-${{ env.PYTHON_VERSION }}-
            python-${{ runner.os }}-

      - name: Install Python environment
        env:
          UV_CACHE_DIR: ${{ runner.temp }}/uv-cache
        shell: bash
        run: |
          rm -rf .uv-cache
          uv sync --extra dev --locked
          rm -rf .uv-cache

      - name: Check formatting
        env:
          UV_CACHE_DIR: ${{ runner.temp }}/uv-cache
        shell: bash
        run: uv run poe lint

      - name: Type-checking with mypy
        env:
          UV_CACHE_DIR: ${{ runner.temp }}/uv-cache
        shell: bash
        run: uv run poe type-check

  tests-linux:
    name: Linux tests (${{ matrix.shard.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        shard:
          - name: core
            tools: "python node go ruby nix"
            markers: "python or go or bash or markdown or yaml or json or toml or ruby or snapshot"
          - name: web
            tools: "python node web"
            markers: "typescript or vue or svelte or php or solidity or haxe or elm or hlsl"
          - name: jvm-dotnet
            tools: "python java dotnet clojure"
            markers: "java or kotlin or groovy or scala or clojure or csharp or fsharp"
          - name: compiled
            tools: "python compiled haskell swift lean"
            markers: "rust or cpp or zig or swift or haskell or pascal or systemverilog or lean4"
          - name: data
            tools: "python data ocaml nix"
            markers: "r or julia or ocaml or fortran or terraform or nix"
          - name: niche
            tools: "python node elixir niche"
            markers: "elixir or lua or luau or perl or rego or ansible or dart or powershell or crystal or erlang or al or matlab or msl"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Free disk space
        run: |
          df -h
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo apt-get clean
          sudo apt-get autoremove -y
          docker system prune -af || true
          df -h

      - name: Run shard
        uses: ./.github/actions/setup-and-test-shard
        with:
          shard-name: ${{ matrix.shard.name }}
          shard-tools: ${{ matrix.shard.tools }}
          shard-markers: ${{ matrix.shard.markers }}

  tests-native:
    name: ${{ matrix.os }} tests (${{ matrix.shard.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 75
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        os: [windows-latest, macos-latest]
        shard:
          - name: core
            tools: "python node go ruby nix"
            markers: "python or go or bash or markdown or yaml or json or toml or ruby or snapshot"
          - name: web
            tools: "python node web"
            markers: "typescript or vue or svelte or php or solidity or haxe or elm or hlsl"
          - name: jvm-dotnet
            tools: "python java dotnet clojure"
            markers: "java or kotlin or groovy or scala or clojure or csharp or fsharp"
          - name: compiled
            tools: "python compiled haskell swift lean"
            markers: "rust or cpp or zig or swift or haskell or pascal or systemverilog or lean4"
          - name: data
            tools: "python data ocaml nix"
            markers: "r or julia or ocaml or fortran or terraform or nix"
          - name: niche
            tools: "python node elixir niche"
            markers: "elixir or lua or luau or perl or rego or ansible or dart or powershell or crystal or erlang or al or matlab or msl"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run shard
        uses: ./.github/actions/setup-and-test-shard
        with:
          shard-name: ${{ matrix.shard.name }}
          shard-tools: ${{ matrix.shard.tools }}
          shard-markers: ${{ matrix.shard.markers }}
