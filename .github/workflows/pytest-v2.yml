          - name: web
            tools: "python node web"
            markers: "typescript or vue or svelte or php or solidity or haxe or elm or hlsl or html or scss or angular"
          - name: jvm-dotnet
            tools: "python java dotnet clojure"
            markers: "java or kotlin or groovy or scala or clojure or csharp or fsharp"
          - name: compiled-cpp
            tools: "python compiled_cpp haskell lean"
            markers: "rust or cpp or zig or pascal or systemverilog or haskell or lean4 or ada"
          - name: compiled-apple
            tools: "python compiled_apple"
            markers: "swift"
          - name: data
            tools: "python data ocaml nix"
            markers: "r or julia or ocaml or fortran or terraform or nix"
          - name: niche-beam
            tools: "python node elixir"
            markers: "elixir or erlang"
          - name: niche-script
            tools: "python java niche"
            markers: "lua or luau or perl or rego or ansible or dart or powershell or crystal or al or matlab or msl or bsl"
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run shard
        uses: ./.github/actions/test-shard
        with:
          shard-name: ${{ matrix.shard.name }}
          shard-tools: ${{ matrix.shard.tools }}
          shard-markers: ${{ matrix.shard.markers }}

  tests-macos:
    name: ${{ matrix.shard.name }} tests-macos
    runs-on: macos-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        shard:
          - name: lint-type
            tools: "python"
            markers: ""
          - name: core
            tools: "python node go ruby"
            markers: "python or go or bash or markdown or yaml or json or toml or ruby or snapshot"
          - name: web
            tools: "python node web"
            markers: "typescript or vue or svelte or php or solidity or haxe or elm or hlsl or html or scss or angular"
          - name: jvm-dotnet
            tools: "python java dotnet clojure"
            markers: "java or kotlin or groovy or scala or clojure or csharp or fsharp"
          - name: compiled-cpp
            tools: "python compiled_cpp haskell lean"
            markers: "rust or cpp or zig or pascal or systemverilog or haskell or lean4 or ada"
          - name: compiled-apple
            tools: "python compiled_apple"
            markers: "swift"
          - name: data
            tools: "python data ocaml nix"
            markers: "r or julia or ocaml or fortran or terraform or nix"
          - name: niche-beam
            tools: "python node elixir"
            markers: "elixir or erlang"
          - name: niche-script
            tools: "python java niche"
            markers: "lua or luau or perl or rego or ansible or dart or powershell or crystal or al or matlab or msl or bsl"
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run shard
        uses: ./.github/actions/test-shard
        with:
          shard-name: ${{ matrix.shard.name }}
          shard-tools: ${{ matrix.shard.tools }}
          shard-markers: ${{ matrix.shard.markers }}
